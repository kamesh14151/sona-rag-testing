<!DOCTYPE html><html>
<head>
<title>Sona RAG Chatbot </title>
<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:#fff;text-align:center}
.container{margin-top:100px}
iframe{position:fixed;bottom:20px;right:20px;width:320px;height:450px;border:none;border-radius:10px}
button{padding:10px 20px;background:#3b82f6;border:none;border-radius:6px;color:#fff}
</style>
</head>
<body>
<div class="container">
<h1>Sona AI Chatbot with rag</h1>

</div>
<iframe id="chat" data-sona-chatbot="true" data-sona-mode="compact" src="https://your-vercel-app.vercel.app/chatbot"></iframe>
<script src="https://your-vercel-app.vercel.app/chatbot-embed.js" defer></script>
</body>
</html>
